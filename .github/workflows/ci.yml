name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        # Non-editable install: the package uses a flat layout
        # (package-dir bracketlearn = "."), so an editable install exposes
        # `bracketlearn` only through a setuptools finder that mypy cannot
        # follow. A regular install lays down a real `bracketlearn/` directory
        # in site-packages that mypy resolves by import name.
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,boosting,quantile-forest]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy

      - name: Tests (pytest)
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine metadata check
        run: twine check dist/*

      - name: Clean-install wheel + import smoke
        # Guards the packaging bug that shipped once: a stale `packages` list
        # omitted bracketlearn.forecast, so the wheel imported fine in the dev
        # editable install but crashed on a clean `pip install`. Install only
        # the wheel into a fresh venv (no source tree on path) and import the
        # full public surface.
        run: |
          python -m venv /tmp/wheelcheck
          /tmp/wheelcheck/bin/pip install --upgrade pip
          /tmp/wheelcheck/bin/pip install "$(ls dist/*.whl)[boosting,quantile-forest]"
          /tmp/wheelcheck/bin/python -c "import bracketlearn; from bracketlearn import Pipeline, Stacker, WalkForward; from bracketlearn.forecast import DistributionForecast, NormalForecast, BracketForecast; from bracketlearn.value import BlendedBracketGBM, value_report_dist; import importlib.resources as r; assert (r.files('bracketlearn.examples') / 'data' / 'weather_value_sample.parquet').is_file(); print('import OK', bracketlearn.__version__)"

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + docs extras
        # boosting / quantile-forest so autodoc can import every trainer module.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs,boosting,quantile-forest]"

      - name: Build docs (warnings are errors)
        run: sphinx-build -b html -W docs docs/_build
